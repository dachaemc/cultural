<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายชื่อสมาชิก | ชมรมรอยอดีต จารีตปัจจุบัน โรงเรียนสุรวิทยาคาร</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .members-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: var(--white);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .members-table th, .members-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .members-table th {
            background: var(--primary);
            color: var(--white);
        }
        .members-table tr:hover {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body style="background: #fff5f5;">
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <i class="fa-solid fa-dragon"></i> ชมรมรอยอดีต จารีตปัจจุบัน
        </a>
        <ul class="nav-links">
            <li><a href="index.html">กลับสู่หน้าหลัก</a></li>
        </ul>
    </nav>

    <section>
        <div class="register-container" style="max-width: 900px; margin-top: 20px;">
            <h2 class="section-title" style="margin-bottom: 20px;">รายชื่อสมาชิกทั้งหมด</h2>
            <p style="text-align: center; margin-bottom: 20px;">จำนวนสมาชิกปัจจุบัน: <strong id="member-count">0</strong> คน</p>
            
            <div style="overflow-x:auto;">
                <table class="members-table">
                    <thead>
                        <tr>
                            <th>ลำดับ</th>
                            <th>ชื่อ - นามสกุล</th>
                            <th>เพศ</th>
                            <th>ระดับชั้น</th>
                            <th>วันที่สมัคร</th>
                        </tr>
                    </thead>
                    <tbody id="members-tbody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #666;">กำลังโหลด...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="index.html#register" class="btn-primary">ไปหน้าสมัครสมาชิก</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; <span id="current-year"></span> ชมรมรอยอดีต จารีตปัจจุบัน โรงเรียนสุรวิทยาคาร</p>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Format Date (DD/MM/YYYY HH:MM)
        function formatDateTime(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const d = String(date.getDate()).padStart(2, '0');
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const y = date.getFullYear();
            const h = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${d}/${m}/${y} ${h}:${min}`;
        }

    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // TODO: นำค่า Configuration ของ Firebase Project ของคุณมาใส่ที่นี่
        const firebaseConfig = {
            apiKey: "AIzaSyBe8k8OwZ5lxVtOSa9Lt_ADQVCLp18Ldbs",
            authDomain: "cultural-plaza.firebaseapp.com",
            projectId: "cultural-plaza",
            storageBucket: "cultural-plaza.firebasestorage.app",
            messagingSenderId: "327844017948",
            appId: "1:327844017948:web:605158835ff985ffdbecd9",
            measurementId: "G-BM3TTLGPEK"
        };


        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Format Date Time
        function formatDateTimeFromFirestore(timestamp) {
            if (!timestamp) return '-';
            const date = timestamp.toDate();
            const d = String(date.getDate()).padStart(2, '0');
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const y = date.getFullYear();
            const h = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${d}/${m}/${y} ${h}:${min}`;
        }

        async function loadMembersFromFirebase() {
            try {
                // ดึงข้อมูลจาก Firestore
                const q = query(collection(db, "members"), orderBy("timestamp", "asc"));
                const querySnapshot = await getDocs(q);
                
                const members = [];
                querySnapshot.forEach((doc) => {
                    const m = doc.data();
                    // แสดงเฉพาะคนที่ได้รับอนุมัติแล้ว หรือสมาชิกเก่าที่ไม่มีฟิลด์ status
                    if (m.status === 'approved' || !m.status) {
                        members.push(m);
                    }
                });
                
                document.getElementById('member-count').textContent = members.length;
                const tbody = document.getElementById('members-tbody');
                tbody.innerHTML = '';
                
                if (members.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">ยังไม่มีผู้ลงทะเบียนเป็นสมาชิกชมรม</td></tr>';
                    return;
                }
                
                members.forEach((m, index) => {
                    const row = document.createElement('tr');
                    const dateTime = formatDateTimeFromFirestore(m.timestamp);
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${m.fullname || '-'}</td>
                        <td>${m.gender || '-'}</td>
                        <td>${m.grade || '-'}</td>
                        <td>${dateTime}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                document.getElementById('members-tbody').innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">ไม่สามารถโหลดข้อมูลรายชื่อสมาชิกได้ กรุณาตรวจสอบการตั้งค่า Firebase</td></tr>';
                console.error("Error loading members: ", error);
            }
        }

        loadMembersFromFirebase();
    </script>
</body>
</html>
