<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายชื่อสมาชิก | ชมรมรอยอาระยะ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .members-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: var(--white);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .members-table th, .members-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .members-table th {
            background: var(--primary);
            color: var(--white);
        }
        .members-table tr:hover {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body style="background: #fff5f5;">
    <nav class="navbar" style="position: relative;">
        <a href="index.html" class="nav-logo">
            <i class="fa-solid fa-dragon"></i> ชมรมรอยอาระยะ
        </a>
        <ul class="nav-links">
            <li><a href="index.html">กลับสู่หน้าหลัก</a></li>
        </ul>
    </nav>

    <section>
        <div class="register-container" style="max-width: 900px; margin-top: 20px;">
            <h2 class="section-title" style="margin-bottom: 20px;">รายชื่อสมาชิกทั้งหมด</h2>
            <p style="text-align: center; margin-bottom: 20px;">จำนวนสมาชิกปัจจุบัน: <strong id="member-count">0</strong> คน</p>
            
            <div style="overflow-x:auto;">
                <table class="members-table">
                    <thead>
                        <tr>
                            <th>ลำดับ</th>
                            <th>ชื่อ - นามสกุล</th>
                            <th>เพศ</th>
                            <th>ระดับชั้น</th>
                            <th>วันที่สมัคร</th>
                        </tr>
                    </thead>
                    <tbody id="members-tbody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #666;">กำลังโหลด...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="index.html#register" class="btn-primary">ไปหน้าสมัครสมาชิก</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; <span id="current-year"></span> ชมรมรอยอาระยะ ลูกหลานจีนโพ้นทะเล และลานพหุวัฒนธรรม โรงเรียนสุรวิทยาคาร</p>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Format Date (DD/MM/YYYY HH:MM)
        function formatDateTime(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const d = String(date.getDate()).padStart(2, '0');
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const y = date.getFullYear();
            const h = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${d}/${m}/${y} ${h}:${min}`;
        }

        async function loadMembers() {
            try {
                const res = await fetch('data/members.json');
                const members = await res.json();
                
                document.getElementById('member-count').textContent = members.length;
                const tbody = document.getElementById('members-tbody');
                tbody.innerHTML = '';
                
                if (members.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">ยังไม่มีผู้ลงทะเบียนเป็นสมาชิกชมรม</td></tr>';
                    return;
                }
                
                members.forEach((m, index) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${m.fullname}</td>
                        <td>${m.gender}</td>
                        <td>${m.grade}</td>
                        <td>${formatDateTime(m.registered_at)}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                document.getElementById('members-tbody').innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">ไม่สามารถโหลดข้อมูลรายชื่อสมาชิกได้</td></tr>';
                console.error(error);
            }
        }

        loadMembers();
    </script>
</body>
</html>
