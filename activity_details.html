<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดกิจกรรม | ชมรมรอยอาระยะ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .details-header {
            padding-top: 120px;
            padding-bottom: 50px;
            background: linear-gradient(rgba(155, 17, 30, 0.9), rgba(102, 0, 0, 0.9)), url('https://via.placeholder.com/1920x1080?text=กำลังโหลด...') center/cover;
            color: var(--white);
            text-align: center;
        }
        .details-header h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .details-content {
            max-width: 900px;
            margin: -30px auto 50px auto;
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 10;
        }
        .details-meta {
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        .gallery-item {
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: var(--transition);
        }
        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        /* Lightbox Image Modal */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
        }
        #lightbox.active {
            display: flex;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .content-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-main);
            white-space: pre-wrap;
        }
    </style>
</head>
<body style="background: var(--bg-color);">
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <i class="fa-solid fa-dragon"></i> ชมรมรอยอาระยะ
        </a>
        <ul class="nav-links">
            <li><a href="index.html">กลับสู่หน้าหลัก</a></li>
        </ul>
    </nav>

    <header class="details-header" id="details-header">
        <div style="padding: 0 20px;">
            <h1 id="activity-title">กำลังโหลด...</h1>
        </div>
    </header>

    <div class="details-content">
        <div class="details-meta">
            <i class="fa-regular fa-calendar"></i> วันที่จัดกิจกรรม: <span id="activity-date"></span>
        </div>
        
        <div class="content-text" id="activity-content"></div>

        <div id="gallery-container" style="display: none;">
            <h3 style="margin-top: 40px; color: var(--primary-dark); font-size: 1.5rem;"><i class="fa-solid fa-images"></i> ประมวลภาพกิจกรรม</h3>
            <div class="gallery-grid" id="gallery-grid"></div>
        </div>

        <div style="text-align: center; margin-top: 50px;">
            <a href="index.html#activities" class="btn-primary" style="background: transparent; color: var(--primary); border: 2px solid var(--primary);"><i class="fa-solid fa-arrow-left"></i> กลับไปหน้ากิจกรรม</a>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox">
        <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <footer>
        <p>&copy; <span id="current-year"></span> ชมรมรอยอาระยะ ลูกหลานจีนโพ้นทะเล และลานพหุวัฒนธรรม โรงเรียนสุรวิทยาคาร</p>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Helper Image URL Formatter
        function formatImageUrl(url) {
            if (!url) return 'https://via.placeholder.com/600x400?text=No+Image';
            if (url.includes('drive.google.com/file/d/')) {
                const match = url.match(/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    return `https://drive.google.com/uc?export=view&id=${match[1]}`;
                }
            }
            return url;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const options = { day: '2-digit', month: 'short', year: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-GB', options);
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) {
                closeLightbox();
            }
        });

        // Get ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const id = parseInt(urlParams.get('id'));

        async function loadActivity() {
            if (!id) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const res = await fetch('data/activities.json');
                const activities = await res.json();
                
                const act = activities.find(a => a.id === id);
                if (!act) {
                    window.location.href = 'index.html';
                    return;
                }

                // Title
                document.getElementById('activity-title').textContent = act.title;
                document.title = `${act.title} | ชมรมรอยอาระยะ`;
                
                // Date
                document.getElementById('activity-date').textContent = formatDate(act.date);
                
                // Cover Image
                const coverImgUrl = formatImageUrl(act.image);
                document.getElementById('details-header').style.backgroundImage = `linear-gradient(rgba(155, 17, 30, 0.9), rgba(102, 0, 0, 0.9)), url('${coverImgUrl}')`;
                
                // Content
                const contentBody = act.content && act.content.trim() !== '' ? act.content : act.description;
                document.getElementById('activity-content').textContent = contentBody;

                // Gallery
                if (act.gallery && act.gallery.length > 0) {
                    document.getElementById('gallery-container').style.display = 'block';
                    const grid = document.getElementById('gallery-grid');
                    
                    act.gallery.forEach(imgUrl => {
                        const formattedUrl = formatImageUrl(imgUrl);
                        const item = document.createElement('div');
                        item.className = 'gallery-item';
                        item.onclick = () => openLightbox(formattedUrl);
                        
                        const img = document.createElement('img');
                        img.src = formattedUrl;
                        img.alt = 'Gallery image';
                        
                        item.appendChild(img);
                        grid.appendChild(item);
                    });
                }

            } catch (error) {
                console.error("Failed to load activity details", error);
            }
        }

        loadActivity();
    </script>
</body>
</html>
